name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "packages/site/**"
      - "packages/ui/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy basalted-site to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/site build
      - name: Publish to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Auto-creates the Pages project on first run.
          bunx wrangler@latest pages deploy packages/site/dist \
            --project-name=basalt-site \
            --branch=main
          # Attach custom domains (idempotent — exits non-zero with
          # "already in use" if the domain is already attached).
          for d in basalted.com www.basalted.com; do
            bunx wrangler@latest pages domain add "$d" \
              --project-name=basalt-site || true
          done
