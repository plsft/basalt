name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
      - "packages/ui/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy basalted-docs to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/docs build
      - name: Publish to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bunx wrangler@latest pages deploy packages/docs/dist \
            --project-name=basalt-docs \
            --branch=main
          bunx wrangler@latest pages domain add docs.basalted.com \
            --project-name=basalt-docs || true
