name: Release Obsidian Plugin

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.13

jobs:
  release:
    name: Build + attach plugin assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Stamp version from tag
        # Obsidian's manifest.json version drives plugin update detection
        # via BRAT and the community store. Sync it with the git tag.
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const path = 'packages/obsidian-plugin/manifest.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            m.version = '${TAG}';
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
          "
          echo "Stamped plugin version: ${TAG}"
      - name: Build plugin
        run: bun run --cwd packages/obsidian-plugin build
      - name: Stage plugin assets
        # BRAT expects manifest.json, main.js, (and optionally styles.css)
        # at the top level of the release. sql-wasm.wasm is our extra
        # runtime dependency; we attach it as a sibling so users can drop
        # all four files into <vault>/.obsidian/plugins/basalt/.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _plugin_stage
          for f in manifest.json main.js styles.css sql-wasm.wasm; do
            if [ -f "packages/obsidian-plugin/$f" ]; then
              cp "packages/obsidian-plugin/$f" _plugin_stage/
            fi
          done
          # Cross-platform zip via Node (host `zip` isn't always on PATH
          # under rehearse / Windows hosts; the Node path works everywhere).
          node scripts/zip-plugin.mjs _plugin_stage _plugin_stage/basalt-obsidian-plugin.zip
          ls -la _plugin_stage/
      - name: Upload artifact (workflow_dispatch path)
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: _plugin_stage/*
          if-no-files-found: error
      - name: Attach to GitHub release (tag path only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          FILES=(_plugin_stage/manifest.json _plugin_stage/main.js _plugin_stage/sql-wasm.wasm _plugin_stage/basalt-obsidian-plugin.zip)
          # styles.css is optional — include only if it exists.
          if [ -f "_plugin_stage/styles.css" ]; then
            FILES+=(_plugin_stage/styles.css)
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILES[@]}" --clobber
          else
            gh release create "${TAG}" --title "${TAG}" --notes "Plugin assets for ${TAG}." "${FILES[@]}"
          fi
