name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.13

jobs:
  desktop:
    name: ${{ matrix.os.label }}
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # macOS Universal: install BOTH arch toolchains; Tauri does the lipo merge into universal-apple-darwin.
          - { label: macOS (Universal), runner: macos-14, target: "universal-apple-darwin", rustup_targets: "aarch64-apple-darwin,x86_64-apple-darwin", bundle: "dmg" }
          - { label: Linux x64,         runner: ubuntu-22.04, target: "x86_64-unknown-linux-gnu", rustup_targets: "x86_64-unknown-linux-gnu", bundle: "deb,appimage" }
          - { label: Windows x64,       runner: windows-2022, target: "x86_64-pc-windows-msvc", rustup_targets: "x86_64-pc-windows-msvc", bundle: "msi,nsis" }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os.rustup_targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/desktop/src-tauri/target/
          key: ${{ matrix.os.runner }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Linux deps
        if: matrix.os.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev patchelf

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build basalted-core
        run: bun run --cwd packages/core build

      - name: Stamp version from tag
        # Tauri reads tauri.conf.json + Cargo.toml versions and embeds them
        # in bundle filenames (Basalt_X.Y.Z_*.dmg etc.). Without this step
        # bundles ship as Basalt_0.0.0_* even on tagged releases. We update
        # all three so the version is consistent everywhere.
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Stamping desktop bundle version: ${TAG}"
          # tauri.conf.json — drives the bundle filename
          node -e "
            const fs = require('fs');
            const p = 'packages/desktop/src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '${TAG}';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          # Cargo.toml — drives the Rust binary metadata
          # Use sed for TOML; only matches the first version line at the top.
          if [ "$(uname)" = "Darwin" ]; then
            sed -i '' -E "0,/^version = \".+\"/s//version = \"${TAG}\"/" packages/desktop/src-tauri/Cargo.toml
          else
            sed -i -E "0,/^version = \".+\"/s//version = \"${TAG}\"/" packages/desktop/src-tauri/Cargo.toml
          fi
          # package.json — metadata only
          node -e "
            const fs = require('fs');
            const p = 'packages/desktop/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = '${TAG}';
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "
          echo "--- tauri.conf.json ---"
          grep -E '"version"' packages/desktop/src-tauri/tauri.conf.json
          echo "--- Cargo.toml ---"
          grep -E '^version' packages/desktop/src-tauri/Cargo.toml | head -1

      - name: Clean stale bundle outputs
        # Cargo cache restores target/ including target/<triple>/release/bundle/
        # from the previous run. Without this step, prior-version bundles
        # (Basalt_X.Y.Z_*.dmg from an earlier release) get re-uploaded
        # alongside the new ones. We keep the rest of target/ (Rust object
        # files, dependency builds) for the speed-up.
        shell: bash
        run: |
          set -euo pipefail
          DIR="packages/desktop/src-tauri/target/${{ matrix.os.target }}/release/bundle"
          if [ -d "$DIR" ]; then
            echo "Removing stale bundles from cache:"
            ls -la "$DIR" || true
            rm -rf "$DIR"
          fi

      - name: Build Tauri app (with macOS signing if configured)
        env:
          # macOS signing — populated when GitHub secrets are present.
          # Register: APPLE_ID, APPLE_PASSWORD (app-specific), APPLE_TEAM_ID,
          # APPLE_CERTIFICATE (base64 of .p12), APPLE_CERTIFICATE_PASSWORD,
          # APPLE_SIGNING_IDENTITY (e.g. "Developer ID Application: ...").
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Windows Authenticode (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          # Tauri tries to use macOS code signing when APPLE_CERTIFICATE is
          # present in the environment, even if it's an empty string. Unset
          # the signing env vars on the unsigned path so the build produces
          # an unsigned .app/.dmg instead of crashing on `security import`.
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID APPLE_CERTIFICATE \
                  APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            unset TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          cd packages/desktop
          bun run tauri build --target ${{ matrix.os.target }}

      - name: Stage bundles with stable filenames
        # Tauri names bundles with the embedded version (e.g.
        # Basalt_1.5.0_universal.dmg). For the marketing site to link to
        # /releases/latest/download/<name> we ALSO ship the same artifacts
        # under version-free names. Both the version-named originals AND
        # the stable-named copies end up on the release.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _desktop_stage
          BUNDLE_DIR="packages/desktop/src-tauri/target/${{ matrix.os.target }}/release/bundle"

          # Copy version-named originals as-is.
          find "$BUNDLE_DIR" -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.deb' \
            -o -name '*.AppImage' -o -name '*.msi' -o -name '*-setup.exe' \
            -o -name '*.sig' \) \
            -exec cp {} _desktop_stage/ \;

          # Add stable-named copies for the marketing site download links.
          case "${{ matrix.os.runner }}" in
            macos-14)
              for f in _desktop_stage/Basalt_*_universal.dmg; do
                [ -f "$f" ] && cp "$f" _desktop_stage/basalt-desktop-macos-universal.dmg
              done
              ;;
            ubuntu-22.04)
              for f in _desktop_stage/Basalt_*_amd64.deb; do
                [ -f "$f" ] && cp "$f" _desktop_stage/basalt-desktop-linux-x64.deb
              done
              for f in _desktop_stage/Basalt_*_amd64.AppImage; do
                [ -f "$f" ] && cp "$f" _desktop_stage/basalt-desktop-linux-x64.AppImage
              done
              ;;
            windows-2022)
              for f in _desktop_stage/Basalt_*_x64_en-US.msi; do
                [ -f "$f" ] && cp "$f" _desktop_stage/basalt-desktop-windows-x64.msi
              done
              for f in _desktop_stage/Basalt_*_x64-setup.exe; do
                [ -f "$f" ] && cp "$f" _desktop_stage/basalt-desktop-windows-x64-setup.exe
              done
              ;;
          esac

          ls -la _desktop_stage/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os.runner }}
          path: _desktop_stage/*
          if-no-files-found: error

  github-release:
    name: Attach to GitHub release
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Attach to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Release was created by release-cli-mcp.yml; we just attach.
          find artifacts -type f | xargs -r gh release upload "${TAG}" --clobber || true
