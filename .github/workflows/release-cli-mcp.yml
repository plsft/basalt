name: Release CLI + MCP

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  BUN_VERSION: 1.3.13

jobs:
  binaries:
    name: Cross-platform binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - windows-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build @basalt/core
        run: bun run --cwd packages/core build
      - name: Compile basalt-cli (${{ matrix.target }})
        run: bun run --cwd packages/cli compile:${{ matrix.target }}
      - name: Compile basalt-mcp (${{ matrix.target }})
        run: bun run --cwd packages/mcp compile:${{ matrix.target }}
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            packages/cli/bin/basalt-${{ matrix.target }}*
            packages/mcp/bin/basalt-mcp-${{ matrix.target }}*

  github-release:
    name: GitHub release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract this version's section from CHANGELOG (under ## $TAG).
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 ~ tag" "{found=1; next}
            found && /^## /{exit}
            found{print}
          ' CHANGELOG.md)
          if [ -z "${NOTES// }" ]; then
            NOTES="Release ${TAG}. See CHANGELOG.md for details."
          fi
          gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}" \
            artifacts/basalt-* \
            artifacts/basalt-mcp-*

  npm-publish:
    name: npm publish
    needs: binaries
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/cli build
          bun run --cwd packages/mcp build
      - name: Publish @basalt/core
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/core
          npm publish --access public --provenance || echo "publish failed; continuing"
      - name: Publish @basalt/cli
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli
          npm publish --access public --provenance || echo "publish failed; continuing"
      - name: Publish @basalt/mcp
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/mcp
          npm publish --access public --provenance || echo "publish failed; continuing"
