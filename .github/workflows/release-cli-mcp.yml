name: Release CLI + MCP

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build"
        type: string
        default: "main"

permissions:
  contents: write
  packages: write

env:
  BUN_VERSION: 1.3.13

jobs:
  binaries:
    name: Cross-platform binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - windows-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build basalted-core
        run: bun run --cwd packages/core build
      - name: Compile basalt-cli (${{ matrix.target }})
        run: bun run --cwd packages/cli compile:${{ matrix.target }}
      - name: Compile basalt-mcp (${{ matrix.target }})
        run: bun run --cwd packages/mcp compile:${{ matrix.target }}
      - name: Stage binaries (flatten for upload)
        run: |
          mkdir -p _release_stage
          cp packages/cli/bin/basalt-${{ matrix.target }}* _release_stage/
          cp packages/mcp/bin/basalt-mcp-${{ matrix.target }}* _release_stage/
          ls -la _release_stage/
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: _release_stage/*
          if-no-files-found: error

  github-release:
    name: GitHub release
    needs: binaries
    runs-on: ubuntu-latest
    # Only create a GitHub Release on real tag pushes. workflow_dispatch
    # runs on a branch and lacks a valid tag — binaries-job artifacts
    # remain downloadable from the run page for validation.
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract this version's section from CHANGELOG (under ## $TAG).
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 ~ tag" "{found=1; next}
            found && /^## /{exit}
            found{print}
          ' CHANGELOG.md)
          if [ -z "${NOTES// }" ]; then
            NOTES="Release ${TAG}. See CHANGELOG.md for details."
          fi
          # Find binaries wherever they ended up under artifacts/.
          mapfile -t FILES < <(find artifacts -type f \( -name 'basalt-*' -o -name 'basalt-mcp-*' \))
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No binaries found under artifacts/. Layout:"
            find artifacts -type f
            exit 1
          fi
          echo "Releasing ${#FILES[@]} binaries:"
          printf '  %s\n' "${FILES[@]}"
          # If the tag already has a release (e.g. re-run on the same tag), upload assets instead.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILES[@]}" --clobber
          else
            gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}" "${FILES[@]}"
          fi

  npm-publish:
    name: npm publish
    needs: binaries
    runs-on: ubuntu-latest
    # Only publish on real tag pushes; skip pre-release tags.
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/cli build
          bun run --cwd packages/mcp build
      - name: Stamp version + rewrite workspace deps
        # Tag is `vX.Y.Z`; strip the leading `v`. Rewrite each published
        # package.json to (a) carry the tag version and (b) replace
        # `workspace:*` deps with the same exact version — npm rejects
        # the `workspace:` protocol on publish.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version: ${TAG}"
          for pkg in packages/core packages/cli packages/mcp; do
            node -e "
              const fs = require('fs');
              const path = '$pkg/package.json';
              const j = JSON.parse(fs.readFileSync(path, 'utf8'));
              j.version = '${TAG}';
              for (const k of ['dependencies','devDependencies','peerDependencies','optionalDependencies']) {
                if (!j[k]) continue;
                for (const name of Object.keys(j[k])) {
                  if (typeof j[k][name] === 'string' && j[k][name].startsWith('workspace:')) {
                    j[k][name] = '${TAG}';
                  }
                }
              }
              fs.writeFileSync(path, JSON.stringify(j, null, 2) + '\n');
            "
            echo "--- $pkg/package.json ---"
            cat "$pkg/package.json"
          done
      - name: Publish basalted-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/core
          npm publish --access public
      - name: Publish basalted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/cli
          npm publish --access public
      - name: Publish basalted-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/mcp
          npm publish --access public
